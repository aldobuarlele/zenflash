syntax = "proto3";

package zenflash;

option java_multiple_files = true;
option java_package = "com.zenflash.grpc";

service NlpService {
  rpc AnalyzeSentence (AnalyzeRequest) returns (AnalyzeResponse);
  rpc SubmitReview (ReviewRequest) returns (ReviewResponse);
  rpc UpdateTranslation (UpdateTranslationRequest) returns (UpdateTranslationResponse);
  rpc GetDueCards (GetDueCardsRequest) returns (GetDueCardsResponse);
  rpc GetPendingCards (GetPendingCardsRequest) returns (GetPendingCardsResponse);
}

message AnalyzeRequest {
  string text = 1;
}

message AnalyzeResponse {
  repeated Token tokens = 1;
  string sentiment = 2;
}

message Token {
  string surface = 1;
  string reading = 2;
  string base_form = 3;
  string part_of_speech = 4;
}

message ReviewRequest {
  string card_id = 1;
  int32 quality_score = 2;
}

message ReviewResponse {
  string next_review_date = 1;
  string message = 2;
}

message UpdateTranslationRequest {
  string card_id = 1;
  string translated_text = 2;
}

message UpdateTranslationResponse {
  bool success = 1;
  string message = 2;
}

message GetDueCardsRequest {
  int32 limit = 1;
}

message GetDueCardsResponse {
  repeated DueCard cards = 1;
}

message DueCard {
  string card_id = 1;
  string front_text = 2;
  string back_text = 3;
}

message GetPendingCardsRequest {
  int32 limit = 1;
}

message GetPendingCardsResponse {
  repeated PendingCard cards = 1;
}

message PendingCard {
  string card_id = 1;
  string text_to_translate = 2;
}