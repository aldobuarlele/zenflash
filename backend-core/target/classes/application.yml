spring:
  application:
    name: zenflash-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/zenflash
    username: zenflash_user
    password: zenflash_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

grpc:
  server:
    port: 9090